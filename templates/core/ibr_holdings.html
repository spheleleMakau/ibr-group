{% extends 'base.html' %}
{% load static %}
{% block title %}IBR Holdings - IBR Group{% endblock %}

{% block content %}
<section class="card foundation-card" style="max-width: 900px; margin: 2rem auto; text-align: center;">
    <img src="{% static 'img/ibr_holdings.jpeg' %}" alt="IBR Holdings Logo" style="height: 100px; border-radius: 16px; margin-bottom: 1.5rem; box-shadow: 0 2px 12px rgba(29,161,210,0.10); background: #F5F7FA; padding: 8px;" />
    <h1 style="color: #1DA1D2;">IBR Holdings</h1>
    <p style="color: #0A3D62; font-size: 1.15rem;">IBR H Property and its core holdings.</p>
    <div style="margin: 1.5rem auto; max-width: 640px; text-align: left;">
        <h3 style="color: #1DA1D2;">IBR H Property</h3>
        <ul style="color: #111111;">
            <li>Thabo Mbeki 185</li>
            <li>Renostervoël Plot</li>
            <li>SKR Luxury Lodge</li>
        </ul>
    </div>
    <a href="/" class="btn" style="background: #1DA1D2; color: #fff; margin-top: 2rem; min-width: 200px;">Back to Home</a>
</section>
{% endblock %}
