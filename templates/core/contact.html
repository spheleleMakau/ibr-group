{% extends 'base.html' %}
{% block title %}Contact - IBR Group{% endblock %}
{% block content %}
<section class="card" style="max-width: 700px; margin: 2rem auto;">
    <h1>Contact Us</h1>
    <p>Email: <a href="mailto:Karabo.rapoo@ibrholdings.co.za">Karabo.rapoo@ibrholdings.co.za</a></p>
    <p>Phone: +27 11 123 4567</p>
    <p>Location: Johannesburg Head Office</p>
    <form method="post" style="margin-top:2rem;">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Your Name" required style="width:100%;margin-bottom:1rem;">
        <input type="email" name="email" placeholder="Your Email" required style="width:100%;margin-bottom:1rem;">
        <textarea name="message" placeholder="Your Message" required style="width:100%;margin-bottom:1rem;"></textarea>
        <button type="submit" class="btn">Send Message</button>
    </form>
    <div style="margin-top:2rem;">
        <div style="width:100%;height:250px;background:#F5F7FA;border-radius:1rem;display:flex;align-items:center;justify-content:center;color:#0A3D62;">Google Maps Placeholder</div>
    </div>
</section>
{% endblock %}
