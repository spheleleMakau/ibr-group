{% extends 'base.html' %}
{% load static %}
{% block title %}IBR Foundation - IBR Group{% endblock %}

{% block content %}
<section class="hero">
    <h1>IBR Foundation</h1>
        <p>Social impact, innovation, and culinary support businesses.</p>
    </section>

<section class="org-chart-section">
    <div class="org-chart-container">
        <div class="org-chart-grid">
            <div class="org-region-card">
                <div class="org-node org-node-secondary org-node-foundation">
                    <div class="region-header">
                        <h3>IBR Foundation</h3>
                    </div>
                    <div class="org-node-tag specialty-tag">IBR H Innovation &amp; AI</div>
                    <div class="holdings-section" style="text-align:center;">
                        <div style="margin: 1.5rem auto 0 auto; max-width: 220px;">
                            <img src="{% static 'img/logo2.png' %}" alt="IBR Foundation Logo" style="height: 100px; width: auto; border-radius: 16px; box-shadow: 0 2px 12px rgba(29,161,210,0.12); background: #fff; padding: 8px;" />
                        </div>
                        <ul class="org-node-list" style="margin-top: 1.5rem;">
                        </ul>
                        <div style="text-align:center; margin: 2rem 0;">
                            <a href="https://ibrfoundation.co.za/" class="btn" style="background: #1DA1D2; color: #fff; min-width: 200px;">Visit Foundation Website</a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>


{% endblock %}
